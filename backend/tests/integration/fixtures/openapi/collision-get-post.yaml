openapi: 3.0.0
info:
  version: 1.0.0
  title: Collision Demo API
paths:
  /posts/{id}:
    get:
      summary: Get post
      operationId: getPost
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
