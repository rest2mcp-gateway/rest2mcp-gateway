openapi: 3.0.0
info:
  version: 1.0.0
  title: Mixed Parameters API
paths:
  /search:
    get:
      summary: Search widgets
      operationId: searchWidgets
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: x-trace-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: string
