<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="wrap header-row">
          <a class="brand" href="{{ '/' | relative_url }}">
            <span class="brand-mark">R2M</span>
            <span class="brand-text">
              <strong>Rest2MC Gateway</strong>
              <span>No-code MCP publishing</span>
            </span>
          </a>
          <nav class="site-nav" aria-label="Primary">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/getting-started/' | relative_url }}">Getting Started</a>
            <a href="{{ '/concepts/' | relative_url }}">Concepts</a>
            <a href="{{ '/authentication/' | relative_url }}">Authentication</a>
            <a href="{{ '/runtime-publishing/' | relative_url }}">Publishing</a>
            <a href="{{ '/secrets-and-scopes/' | relative_url }}">Secrets & Scopes</a>
            <a href="{{ '/openapi-import/' | relative_url }}">OpenAPI Import</a>
            <a href="{{ '/deployment/' | relative_url }}">Deployment</a>
          </nav>
        </div>
      </header>
      <main class="site-main">
        <div class="wrap content-shell">
          {{ content }}
        </div>
      </main>
      <footer class="site-footer">
        <div class="wrap footer-row">
          <p>Rest2MC Gateway documentation</p>
          <p>Built from the same repository as the product for tighter accuracy.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
